<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MediaBrowser{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --mb-bg: #0d1117;
      --mb-card: #161b22;
      --mb-border: #30363d;
      --mb-accent: #e94560;
      --mb-text: #ffffff;
      --mb-text-muted: #c9d1d9;
    }

    body {
      background-color: var(--mb-bg);
      color: var(--mb-text);
      min-height: 100vh;
    }

    .navbar {
      background-color: var(--mb-card) !important;
      border-bottom: 1px solid var(--mb-border);
    }

    .navbar-brand {
      color: var(--mb-accent) !important;
      font-weight: 700;
      font-size: 1.4rem;
    }

    .nav-link {
      color: var(--mb-text-muted) !important;
    }

    .nav-link:hover {
      color: var(--mb-text) !important;
    }

    .card {
      background-color: var(--mb-card);
      border: 1px solid var(--mb-border);
      transition: transform .15s, border-color .15s;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--mb-accent);
    }

    .card-title {
      color: var(--mb-text);
      font-size: .9rem;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-img-top {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #1a1a2e;
    }

    .folder-item {
      background-color: var(--mb-card);
      border: 1px solid var(--mb-border);
      border-radius: 8px;
      padding: .5rem 1rem;
      color: var(--mb-text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: border-color .15s, background-color .15s;
    }

    .folder-item:hover {
      border-color: var(--mb-accent);
      background-color: #1c2333;
      color: var(--mb-text);
    }

    .breadcrumb-item a {
      color: var(--mb-accent);
      text-decoration: none;
    }

    .breadcrumb-item.active {
      color: var(--mb-text-muted);
    }

    .breadcrumb-item+.breadcrumb-item::before {
      color: var(--mb-border);
    }

    .badge-video {
      background-color: var(--mb-accent);
    }

    .badge-image {
      background-color: #2ea043;
    }

    .section-title {
      color: var(--mb-text-muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .75rem;
    }

    a {
      color: var(--mb-accent);
    }

    a:hover {
      color: #ff6b81;
    }

    .btn-primary {
      background-color: var(--mb-accent);
      border-color: var(--mb-accent);
    }

    .btn-primary:hover {
      background-color: #c73652;
      border-color: #c73652;
    }

    .btn-outline-secondary {
      color: var(--mb-text-muted);
      border-color: var(--mb-border);
    }

    .btn-outline-secondary:hover {
      background-color: var(--mb-card);
      color: var(--mb-text);
    }

    .library-card {
      text-decoration: none;
    }

    .library-card .card-body {
      padding: 1.25rem;
    }

    .library-icon {
      font-size: 2.5rem;
      color: var(--mb-accent);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'browser:library_list' %}">
        <i class="bi bi-play-circle-fill me-1"></i>MediaBrowser
      </a>
      <div class="ms-auto d-flex align-items-center gap-3">
        {% if user.is_authenticated %}
        <span class="text-muted small" style="color: var(--mb-text-muted) !important;"><i class="bi bi-person-circle me-1"></i>{{ user.username }}</span>
        {% if user.is_staff %}
        <a href="{% url 'admin:index' %}" class="nav-link">Admin</a>
        {% endif %}
        <form method="post" action="{% url 'logout' %}" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-link nav-link p-0">Sign out</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="nav-link">Sign in</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
